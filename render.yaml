services:
  - type: web
    name: aura-essence-api
    region: oregon
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input"
    startCommand: "python manage.py migrate --noinput && python manage.py create_initial_users && python manage.py restore_database --fixture backups/db_backup.json && python manage.py backup_database --output backups/db_backup.json && python manage.py migrate_media_to_s3 && gunicorn myproject.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: perfumes-1.onrender.com,.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://perfumes-1.onrender.com,https://*.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: aura-essence-db
          property: connectionString
      - key: BACKUP_FILE_PATH
        value: backups/db_backup.json
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: securepassword
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RECAPTCHA_PUBLIC_KEY
        sync: false
      - key: RECAPTCHA_PRIVATE_KEY
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        value: "perfumes-media-2026"
      - key: AWS_S3_REGION_NAME
        value: "us-east-1"

databases:
  - name: aura-essence-db
    region: oregon
    databaseName: aura_essence
    user: aura_essence_user

services:
  - type: web
    name: aura-essence-api
    region: oregon
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input"
    preDeployCommand: "python manage.py backup_database --output /var/data/backups/db_backup.json"
    startCommand: "python manage.py migrate --noinput && python manage.py create_initial_users && python manage.py restore_database --fixture /var/data/backups/db_backup.json && python manage.py backup_database --output /var/data/backups/db_backup.json && gunicorn myproject.wsgi:application"
    disk:
      name: aura-essence-backups
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: aura-essence-db
          property: connectionString
      - key: BACKUP_FILE_PATH
        value: /var/data/backups/db_backup.json
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: securepassword
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RECAPTCHA_PUBLIC_KEY
        sync: false
      - key: RECAPTCHA_PRIVATE_KEY
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false

databases:
  - name: aura-essence-db
    region: oregon
    databaseName: aura_essence
    user: aura_essence_user

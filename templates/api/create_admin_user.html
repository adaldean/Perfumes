{% extends "base.html" %}

{% block title %}Crear Usuario Admin{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="bg-white dark:bg-zinc-800 shadow-md rounded-lg p-6">
        <h1 class="text-2xl font-bold text-brand-dark dark:text-gray-100 mb-4">Resultado de la Operación</h1>
        <div class="p-4 border {{ status|yesno:'border-green-500,border-red-500' }} rounded-lg">
            <p class="text-lg font-medium {{ status|yesno:'text-green-500,text-red-500' }}">{{ message }}</p>
        </div>
        <a href="{% url 'home' %}" class="mt-4 inline-block text-brand-gold hover:text-brand-accent transition-colors">Volver al inicio</a>
    </div>
</div>
{% endblock %}
